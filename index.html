<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>POS Kasir Pintar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <link rel="manifest" href="./manifest.json">
    <style>
        :root { --color-primary: #2563eb; } /* Warna Default */
        .bg-brand { background-color: var(--color-primary) !important; }
        .text-brand { color: var(--color-primary) !important; }
        .border-brand { border-color: var(--color-primary) !important; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        button { touch-action: manipulation; }
    </style>
</head>
<body class="bg-gray-100 h-[100dvh] overflow-hidden flex flex-col font-sans">

    <div id="login-screen" class="fixed inset-0 bg-brand z-50 flex flex-col justify-center items-center">
        <div class="bg-white p-6 md:p-8 rounded-2xl shadow-2xl w-11/12 max-w-sm text-center">
            <h2 class="text-2xl font-bold mb-2 text-brand nama-toko-display">POS KASIR</h2>
            <input type="password" id="pin-input" readonly class="w-full text-center text-3xl font-bold tracking-widest p-3 border rounded-xl bg-gray-50 mb-6 focus:outline-none">
            <div class="grid grid-cols-3 gap-2 md:gap-3">
                <button onclick="tekanPin('1')" class="bg-gray-200 text-xl font-bold p-3 md:p-4 rounded-xl active:bg-gray-300">1</button>
                <button onclick="tekanPin('2')" class="bg-gray-200 text-xl font-bold p-3 md:p-4 rounded-xl active:bg-gray-300">2</button>
                <button onclick="tekanPin('3')" class="bg-gray-200 text-xl font-bold p-3 md:p-4 rounded-xl active:bg-gray-300">3</button>
                <button onclick="tekanPin('4')" class="bg-gray-200 text-xl font-bold p-3 md:p-4 rounded-xl active:bg-gray-300">4</button>
                <button onclick="tekanPin('5')" class="bg-gray-200 text-xl font-bold p-3 md:p-4 rounded-xl active:bg-gray-300">5</button>
                <button onclick="tekanPin('6')" class="bg-gray-200 text-xl font-bold p-3 md:p-4 rounded-xl active:bg-gray-300">6</button>
                <button onclick="tekanPin('7')" class="bg-gray-200 text-xl font-bold p-3 md:p-4 rounded-xl active:bg-gray-300">7</button>
                <button onclick="tekanPin('8')" class="bg-gray-200 text-xl font-bold p-3 md:p-4 rounded-xl active:bg-gray-300">8</button>
                <button onclick="tekanPin('9')" class="bg-gray-200 text-xl font-bold p-3 md:p-4 rounded-xl active:bg-gray-300">9</button>
                <button onclick="bersihkanPin()" class="bg-red-100 text-red-600 text-sm md:text-base font-bold p-3 md:p-4 rounded-xl active:bg-red-200">C</button>
                <button onclick="tekanPin('0')" class="bg-gray-200 text-xl font-bold p-3 md:p-4 rounded-xl active:bg-gray-300">0</button>
                <button onclick="verifikasiPin()" class="bg-brand text-white text-sm md:text-base font-bold p-3 md:p-4 rounded-xl hover:opacity-90">OK</button>
            </div>
        </div>
    </div>

    <header class="bg-brand text-white px-3 py-2 md:px-4 md:py-3 flex flex-wrap gap-2 justify-between items-center shadow-md shrink-0 border-b border-white border-opacity-10">
        <div>
            <h1 class="text-lg md:text-xl font-bold leading-tight nama-toko-display">POS KASIR</h1>
            <p class="text-[10px] md:text-xs text-white text-opacity-80">Kasir: <span id="nama-kasir">-</span></p>
        </div>
        <div class="flex flex-wrap gap-1 md:gap-3 items-center justify-end">
            <span id="sync-status" class="text-[10px] md:text-xs bg-green-400 px-2 py-1 rounded-full text-black font-semibold">Online</span>
            <button onclick="bukaRiwayat()" class="bg-black bg-opacity-20 text-[10px] md:text-xs px-2 py-1 md:px-3 md:py-1.5 rounded hover:bg-opacity-40 transition">📜 Riwayat</button>
            <button onclick="hubungkanPrinter()" id="status-printer" class="bg-black bg-opacity-20 text-[10px] md:text-xs px-2 py-1 md:px-3 md:py-1.5 rounded hover:bg-opacity-40 transition">🖨️ Printer</button>
            <button onclick="window.location.href='./admin.html'" class="bg-yellow-400 text-yellow-900 text-[10px] md:text-xs px-2 py-1 md:px-3 md:py-1.5 rounded font-bold hover:bg-yellow-500 transition shadow-sm shrink-0">👑 Owner</button>
            <button onclick="lockScreen()" class="bg-red-500 text-[10px] md:text-xs px-2 py-1 md:px-3 md:py-1.5 rounded font-bold hover:bg-red-600 transition shadow-sm">Kunci</button>
        </div>
    </header>

    <main class="flex flex-1 flex-col lg:flex-row overflow-hidden relative">
        <section class="flex flex-col flex-1 h-[50%] lg:h-full lg:w-2/3 bg-gray-100 z-10">
            <div class="p-3 bg-white shrink-0 shadow-sm z-10 flex gap-2">
                <input type="text" id="search-product" placeholder="Cari Produk / Barcode..." class="flex-1 p-2 md:p-3 text-sm rounded-lg md:rounded-xl border focus:ring-2 focus:ring-brand outline-none">
                <button onclick="bukaScanner()" class="bg-white text-brand border border-brand font-bold text-sm px-3 md:px-4 rounded-lg md:rounded-xl shadow-sm active:bg-gray-50 hover:bg-gray-50">📷 Scan</button>
            </div>
            <div class="flex-1 overflow-y-auto p-3">
                <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3" id="container-produk"></div>
            </div>
        </section>

        <aside class="flex flex-col h-[50%] lg:h-full w-full lg:w-96 bg-white shadow-[0_-5px_15px_rgba(0,0,0,0.1)] lg:shadow-xl lg:border-l z-20 shrink-0">
            <div class="p-2 md:p-3 border-b bg-gray-50 flex justify-between items-center shrink-0">
                <h2 class="font-bold text-sm md:text-base text-gray-800 ml-1">Daftar Belanja</h2>
                <button onclick="toggleModal('modal-open-bill')" class="text-[10px] md:text-xs text-brand border border-brand px-2 py-1 rounded active:bg-blue-50">+ Open Bill</button>
            </div>
            
            <div id="open-bill-indicator" class="hidden bg-amber-50 px-3 py-1 text-xs text-amber-700 flex justify-between border-b shrink-0">
                <span class="truncate">Bon: <strong id="lbl-pelanggan"></strong></span>
                <button onclick="batalOpenBill()" class="text-red-500 font-bold ml-2 px-2">X</button>
            </div>
            
            <div class="flex-1 overflow-y-auto p-3 space-y-2 bg-gray-50" id="cart-items">
                <p class="text-center text-gray-400 mt-5 text-sm">Keranjang kosong</p>
            </div>
            
            <div class="p-3 pb-5 md:p-3 border-t bg-white shrink-0 z-30 shadow-[0_-2px_10px_rgba(0,0,0,0.05)]">
                <div class="flex justify-between items-center mb-1">
                    <span class="text-xs md:text-sm text-gray-600">Diskon:</span>
                    <input type="number" id="input-diskon" value="0" oninput="hitungTotal()" class="w-20 md:w-24 p-1 text-sm border text-right rounded outline-none focus:border-brand">
                </div>
                <div class="flex justify-between items-center mb-1">
                    <span class="text-xs md:text-sm text-gray-600">Metode:</span>
                    <select id="select-payment" class="w-20 md:w-24 p-1 text-sm border rounded bg-white outline-none">
                        <option>Tunai</option><option>QRIS</option><option>Transfer</option>
                    </select>
                </div>
                <div class="flex justify-between font-bold text-lg md:text-xl pt-2 border-t text-gray-800">
                    <span>Total:</span><span id="txt-total" class="text-brand">Rp 0</span>
                </div>
                <button onclick="selesaikanTransaksi('Closed')" class="w-full bg-brand text-white font-bold py-3 md:py-3 rounded-xl shadow-md mt-2 opacity-90 hover:opacity-100 text-sm md:text-base tracking-wide">Bayar Sekarang</button>
            </div>
        </aside>
    </main>

    <div id="modal-scanner" class="fixed inset-0 bg-black bg-opacity-70 z-50 hidden flex justify-center items-center p-4"><div class="bg-white p-4 rounded-xl w-full max-w-sm"><div class="flex justify-between mb-4"><h3 class="font-bold">Kamera Barcode</h3><button onclick="tutupScanner()" class="text-red-500 font-bold px-3 py-1 rounded active:bg-red-50">X</button></div><div id="reader"></div></div></div>
    <div id="modal-open-bill" class="fixed inset-0 bg-black bg-opacity-50 z-40 hidden flex justify-center items-center p-4"><div class="bg-white p-6 rounded-xl w-full max-w-sm"><h3 class="font-bold mb-4">Simpan Bon</h3><input type="text" id="ob-pelanggan" placeholder="Nama Pelanggan" class="w-full p-3 border rounded-lg mb-3 text-sm focus:ring-2 outline-none focus:ring-brand"><input type="text" id="ob-meja" placeholder="Nomor Meja/Catatan" class="w-full p-3 border rounded-lg mb-4 text-sm focus:ring-2 outline-none focus:ring-brand"><div class="flex gap-2"><button onclick="toggleModal('modal-open-bill')" class="w-1/2 border py-2.5 rounded-lg text-sm font-bold active:bg-gray-50">Batal</button><button onclick="simpanSebagaiOpenBill()" class="w-1/2 bg-brand text-white py-2.5 rounded-lg text-sm font-bold opacity-90 hover:opacity-100">Simpan</button></div></div></div>
    <div id="modal-riwayat" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex justify-center items-center p-4">
        <div class="bg-white p-4 md:p-6 rounded-2xl w-full max-w-md h-[85vh] flex flex-col shadow-2xl">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-3 border-b pb-3 gap-2">
                <h3 class="font-bold text-base md:text-lg">Riwayat Kasir Lokal</h3>
                <div class="flex gap-2">
                    <button onclick="exportExcelKasir()" class="bg-green-100 text-green-700 px-3 py-1 rounded-lg text-xs font-bold hover:bg-green-200">📊 Excel</button>
                    <button onclick="cetakPDFKasir()" class="bg-red-100 text-red-700 px-3 py-1 rounded-lg text-xs font-bold hover:bg-red-200">📄 PDF</button>
                    <button onclick="toggleModal('modal-riwayat')" class="text-gray-500 font-bold px-3 py-1 bg-gray-100 rounded-lg hover:bg-gray-200">Tutup</button>
                </div>
            </div>
            <div class="flex-1 overflow-y-auto space-y-3 pr-1" id="list-riwayat"></div>
        </div>
    </div>

    <script>
        const URL_GAS = "https://script.google.com/macros/s/AKfycbyJ-Whc2-BmYpH9p30HLXUCvnWjn90eV9kSBgfwISz8kY7Vi0A-EUkxM1cPVaZxQ9f9/exec"; 
        const SECRET_KEY = "GembokKasirPintar2026"; 
        
        let USER_DB = {}; let PRODUCT_DB = []; let kasirAktif = "", keranjang = [], infoOpenBill = null;
        let riwayatLokal = JSON.parse(localStorage.getItem('riwayat_kasir_lokal')) || [];

        if ('serviceWorker' in navigator) navigator.serviceWorker.register('./service-worker.js');
        
        // Terapkan Pengaturan Visual
        function terapkanPengaturanUI(pengaturan) {
            if(pengaturan.Warna_Utama) document.documentElement.style.setProperty('--color-primary', pengaturan.Warna_Utama);
            if(pengaturan.Nama_Toko) {
                document.title = pengaturan.Nama_Toko + " - Kasir";
                document.querySelectorAll('.nama-toko-display').forEach(el => el.innerText = pengaturan.Nama_Toko.toUpperCase());
            }
        }
        const savedSettings = JSON.parse(localStorage.getItem('pengaturan_toko'));
        if(savedSettings) terapkanPengaturanUI(savedSettings);

        let db; const request = indexedDB.open('POS_Database', 1);
        request.onupgradeneeded = (e) => { db = e.target.result; if (!db.objectStoreNames.contains('transaksi_offline')) db.createObjectStore('transaksi_offline', { keyPath: 'id_transaksi' }); };
        request.onsuccess = (e) => { db = e.target.result; cekStatusInternet(); tarikMasterData(); };

        function cekStatusInternet() {
            const b = document.getElementById('sync-status');
            if (navigator.onLine) { b.innerText = "Online"; b.className = "text-[10px] md:text-xs bg-green-400 px-2 py-1 rounded-full text-black font-semibold"; syncDataKeSheets(); } 
            else { b.innerText = "Offline"; b.className = "text-[10px] md:text-xs bg-red-500 px-2 py-1 rounded-full text-white font-semibold"; }
        }
        window.addEventListener('online', cekStatusInternet); window.addEventListener('offline', cekStatusInternet);

        async function tarikMasterData() {
            if(!navigator.onLine) return; 
            try {
                const res = await fetch(URL_GAS + "?action=get_kasir_data&api_key=" + SECRET_KEY);
                const data = await res.json();
                if(data.status === "success") {
                    PRODUCT_DB = data.produk;
                    USER_DB = {}; data.pengguna.forEach(u => USER_DB[u.PIN] = u.Nama);
                    
                    // Update Tema dari Server
                    if (data.pengaturan) { localStorage.setItem('pengaturan_toko', JSON.stringify(data.pengaturan)); terapkanPengaturanUI(data.pengaturan); }
                    if (data.riwayat && data.riwayat.length > 0) { riwayatLokal = data.riwayat; localStorage.setItem('riwayat_kasir_lokal', JSON.stringify(riwayatLokal)); }
                    
                    if(kasirAktif) inisialisasiKatalog();
                }
            } catch(e) {}
        }

        function toggleModal(id) { document.getElementById(id).classList.toggle('hidden'); }
        function tekanPin(n) { document.getElementById('pin-input').value += n; }
        function bersihkanPin() { document.getElementById('pin-input').value = ""; }
        function lockScreen() { document.getElementById('login-screen').classList.remove('hidden'); bersihkanPin(); }
        function verifikasiPin() {
            const pin = document.getElementById('pin-input').value;
            if (USER_DB[pin]) { kasirAktif = USER_DB[pin]; document.getElementById('nama-kasir').innerText = kasirAktif; document.getElementById('login-screen').classList.add('hidden'); inisialisasiKatalog(); } 
            else { alert("PIN salah!"); bersihkanPin(); }
        }

        function inisialisasiKatalog() {
            const c = document.getElementById('container-produk'); c.innerHTML = "";
            PRODUCT_DB.forEach(p => {
                const hargaTampil = parseInt(p.Harga_Jual.toString().replace(/[^0-9]/g, '')) || 0;
                c.innerHTML += `<div onclick="tambahKeKeranjang('${p.SKU}')" class="bg-white p-3 md:p-4 rounded-xl border border-gray-200 cursor-pointer active:bg-blue-50 active:border-brand shadow-sm transition"><span class="text-[9px] md:text-[10px] text-gray-400 block mb-1">${p.Kategori}</span><h4 class="font-bold text-xs md:text-sm text-gray-800 leading-tight line-clamp-2">${p.Nama}</h4><span class="text-brand font-black text-xs md:text-sm block mt-2">Rp ${hargaTampil.toLocaleString('id-ID')}</span></div>`;
            });
        }

        function tambahKeKeranjang(sku) {
            const p = PRODUCT_DB.find(x => x.SKU === sku); const item = keranjang.find(x => x.sku === sku);
            const hargaBersih = parseInt(p.Harga_Jual.toString().replace(/[^0-9]/g, '')) || 0;
            if (item) { item.qty++; item.subtotal = item.qty * hargaBersih; } else { keranjang.push({ sku: p.SKU, nama: p.Nama, qty: 1, harga: hargaBersih, subtotal: hargaBersih }); }
            renderKeranjang();
        }

        function renderKeranjang() {
            const c = document.getElementById('cart-items'); c.innerHTML = keranjang.length ? '' : '<p class="text-center text-gray-400 mt-5 text-sm">Keranjang kosong</p>';
            keranjang.forEach((i, idx) => { c.innerHTML += `<div class="flex justify-between items-center bg-white p-2 border border-gray-100 rounded shadow-sm"><div class="flex-1 pr-2"><h5 class="font-bold text-xs text-gray-800 leading-tight">${i.nama}</h5><span class="text-[10px] md:text-[11px] text-gray-500">${i.qty} x Rp ${parseInt(i.harga).toLocaleString('id-ID')}</span></div><div class="flex items-center gap-2"><span class="font-bold text-xs text-gray-800 w-16 text-right">Rp ${parseInt(i.subtotal).toLocaleString('id-ID')}</span><button onclick="hapusItem(${idx})" class="text-red-500 bg-red-50 h-7 w-7 rounded-lg flex items-center justify-center font-bold active:bg-red-200 ml-1">X</button></div></div>`; });
            hitungTotal();
        }
        
        function hapusItem(idx) { keranjang.splice(idx, 1); renderKeranjang(); }
        
        function hitungTotal() {
            const sub = keranjang.reduce((s, i) => s + parseInt(i.subtotal), 0);
            const dsk = parseInt(document.getElementById('input-diskon').value.toString().replace(/[^0-9]/g, '')) || 0;
            document.getElementById('txt-total').innerText = "Rp " + Math.max(0, sub - dsk).toLocaleString('id-ID');
        }

        document.getElementById('search-product').addEventListener('input', e => { const k = e.target.value.toLowerCase(); Array.from(document.getElementById('container-produk').children).forEach(el => el.style.display = el.innerText.toLowerCase().includes(k) ? "block" : "none"); });

        function simpanSebagaiOpenBill() {
            const n = document.getElementById('ob-pelanggan').value; if(!n) return alert("Isi nama pelanggan!");
            infoOpenBill = { nama_pelanggan: n, no_meja: document.getElementById('ob-meja').value };
            document.getElementById('lbl-pelanggan').innerText = n; document.getElementById('open-bill-indicator').classList.remove('hidden');
            toggleModal('modal-open-bill'); selesaikanTransaksi('Open');
        }
        function batalOpenBill() { infoOpenBill = null; document.getElementById('open-bill-indicator').classList.add('hidden'); }

        function selesaikanTransaksi(st) {
            if (keranjang.length === 0) return alert("Keranjang belanja masih kosong!");
            const dsk = parseInt(document.getElementById('input-diskon').value.toString().replace(/[^0-9]/g, '')) || 0, sub = keranjang.reduce((s, i) => s + parseInt(i.subtotal), 0);
            const txData = { id_transaksi: "TRX-" + Date.now(), tanggal: new Date().toISOString(), total_bayar: Math.max(0, sub - dsk), diskon_transaksi: dsk, metode_bayar: document.getElementById('select-payment').value, kasir: kasirAktif, status: st, nama_pelanggan: infoOpenBill ? infoOpenBill.nama_pelanggan : "", no_meja: infoOpenBill ? infoOpenBill.no_meja : "", items: keranjang };

            if(db) db.transaction(['transaksi_offline'], 'readwrite').objectStore('transaksi_offline').add(txData);
            riwayatLokal.push(txData); if(riwayatLokal.length > 50) riwayatLokal.shift(); localStorage.setItem('riwayat_kasir_lokal', JSON.stringify(riwayatLokal));

            cetakStruk(txData); syncDataKeSheets();
            alert(st === 'Open' ? "Bon berhasil digantung/disimpan!" : "Transaksi Berhasil!");
            keranjang = []; document.getElementById('input-diskon').value = 0; batalOpenBill(); renderKeranjang();
        }

        async function syncDataKeSheets() {
            if (!navigator.onLine || !db) return;
            const store = db.transaction(['transaksi_offline'], 'readonly').objectStore('transaksi_offline');
            store.getAll().onsuccess = async (e) => {
                const arr = e.target.result; if (arr.length === 0) return;
                try {
                    const res = await fetch(URL_GAS, { method: 'POST', body: JSON.stringify({ action: "sync_transaksi", api_key: SECRET_KEY, data: arr }) });
                    if (res.ok || res.type === 'opaque') { const txHapus = db.transaction(['transaksi_offline'], 'readwrite').objectStore('transaksi_offline'); arr.forEach(t => txHapus.delete(t.id_transaksi)); tarikMasterData(); }
                } catch(err) {}
            };
        }

        let html5QrcodeScanner; function bukaScanner() { toggleModal('modal-scanner'); html5QrcodeScanner = new Html5Qrcode("reader"); html5QrcodeScanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (txt) => { const p = PRODUCT_DB.find(x => x.SKU == txt); if (p) { tambahKeKeranjang(p.SKU); tutupScanner(); } else alert("Barcode tidak terdaftar"); }).catch(e=>{}); }
        function tutupScanner() { toggleModal('modal-scanner'); if (html5QrcodeScanner) html5QrcodeScanner.stop().then(()=>html5QrcodeScanner.clear()); }

        let printerServer; async function hubungkanPrinter() { try { printerServer = await (await navigator.bluetooth.requestDevice({ filters: [{ services: ['000018f0-0000-1000-8000-00805f9b34fb'] }], optionalServices: ['e7810a71-73ae-499d-8c15-faa9aef0c3f2'] })).gatt.connect(); document.getElementById('status-printer').innerText = "🖨️ " + printerServer.device.name; alert("Printer Bluetooth Terhubung!"); } catch (err) {} }
        
        async function cetakStruk(tx) {
            if (!printerServer || !printerServer.connected) return;
            try {
                const char = await (await printerServer.getPrimaryService('000018f0-0000-1000-8000-00805f9b34fb')).getCharacteristic('00002af1-0000-1000-8000-00805f9b34fb');
                const namaTokoCetak = JSON.parse(localStorage.getItem('pengaturan_toko'))?.Nama_Toko || "POS KASIR";
                let t = `\x1B\x61\x01${namaTokoCetak.toUpperCase()}\n--------------------------\n\x1B\x61\x00No: ${tx.id_transaksi}\nKasir: ${tx.kasir}\n--------------------------\n`;
                tx.items.forEach(i => t += `${i.nama}\n${i.qty} x ${i.harga}   Rp ${i.subtotal}\n`);
                t += `--------------------------\nTOTAL: Rp ${tx.total_bayar}\n\n\n`;
                const b = new TextEncoder().encode(t); for (let i = 0; i < b.length; i += 512) await char.writeValue(b.slice(i, i + 512));
            } catch(e){}
        }

        async function cetakUlangStruk(idTrx) {
            const tx = riwayatLokal.find(t => t.id_transaksi === idTrx); if (!tx) return;
            if (!printerServer || !printerServer.connected) { alert("Printer Bluetooth belum terhubung! Silakan klik tombol '🖨️ Printer' di menu atas terlebih dahulu."); return; }
            await cetakStruk(tx);
        }

        function bukaRiwayat() {
            toggleModal('modal-riwayat'); const c = document.getElementById('list-riwayat'); 
            c.innerHTML = riwayatLokal.length === 0 ? '<p class="text-center text-gray-400 mt-10 text-sm">Belum ada transaksi</p>' : '';
            [...riwayatLokal].reverse().forEach(trx => {
                let rincianBarang = trx.items.map(i => `<div class="flex justify-between text-xs text-gray-500"><span>${i.qty}x ${i.nama}</span><span>Rp ${i.subtotal.toLocaleString('id-ID')}</span></div>`).join('');
                c.innerHTML += `<div class="border border-gray-200 rounded-xl p-4 shadow-sm bg-white mb-2"><div class="flex justify-between border-b border-gray-100 pb-2 mb-2"><div class="truncate pr-2"><span class="font-bold text-xs md:text-sm text-gray-800">${trx.id_transaksi}</span><p class="text-[10px] text-gray-400">${new Date(trx.tanggal).toLocaleString('id-ID')} | ${trx.kasir}</p></div><div class="text-right shrink-0"><span class="font-black text-brand text-sm">Rp ${trx.total_bayar.toLocaleString('id-ID')}</span><p class="text-[10px] text-gray-500">${trx.metode_bayar}</p></div></div><div class="space-y-1 mb-3">${rincianBarang}</div><button onclick="cetakUlangStruk('${trx.id_transaksi}')" class="w-full bg-blue-50 text-brand border border-brand font-bold py-2 rounded-lg text-xs opacity-90 hover:opacity-100 transition shadow-sm">🖨️ Cetak Ulang Struk</button></div>`;
            });
        }

        // FITUR BARU: EXPORT EXCEL (KASIR)
        function exportExcelKasir() {
            if(riwayatLokal.length === 0) return alert("Tidak ada data transaksi!");
            let csv = "Waktu,ID Transaksi,Kasir,Metode,Total Bayar,Item\n";
            [...riwayatLokal].reverse().forEach(trx => {
                let tgl = new Date(trx.tanggal).toLocaleString('id-ID');
                let itemStr = (trx.items || []).map(i => `${i.qty}x ${i.nama}`).join(" + ").replace(/"/g, '""');
                csv += `"${tgl}","${trx.id_transaksi}","${trx.kasir}","${trx.metode_bayar}","${trx.total_bayar}","${itemStr}"\n`;
            });
            const link = document.createElement("a");
            link.href = encodeURI("data:text/csv;charset=utf-8," + csv);
            link.download = `Laporan_Shift_Kasir_${new Date().toLocaleDateString('id-ID')}.csv`;
            document.body.appendChild(link); link.click(); document.body.removeChild(link);
        }

        // FITUR BARU: CETAK PDF (KASIR)
        function cetakPDFKasir() {
            if(riwayatLokal.length === 0) return alert("Tidak ada data untuk dicetak!");
            let w = window.open('', '', 'height=650,width=900');
            w.document.write('<html><head><title>Laporan Shift Kasir</title>');
            w.document.write('<style>body{font-family:sans-serif;} table{width:100%;border-collapse:collapse;margin-top:20px;font-size:12px;} th,td{border:1px solid #ddd;padding:8px;text-align:left;} th{background-color:#f4f4f4;} .text-right{text-align:right;}</style></head><body>');
            w.document.write(`<h2>Laporan Shift Kasir</h2><p>Dicetak: ${new Date().toLocaleString('id-ID')}</p>`);
            w.document.write('<table><thead><tr><th>Waktu</th><th>ID Transaksi</th><th>Metode</th><th>Items</th><th>Total</th></tr></thead><tbody>');
            
            let total = 0;
            [...riwayatLokal].reverse().forEach(trx => {
                total += trx.total_bayar;
                let tgl = new Date(trx.tanggal).toLocaleString('id-ID');
                let itemStr = (trx.items || []).map(i => `${i.qty}x ${i.nama}`).join("<br>");
                w.document.write(`<tr><td>${tgl}</td><td>${trx.id_transaksi}</td><td>${trx.metode_bayar}</td><td>${itemStr}</td><td class="text-right">Rp ${trx.total_bayar.toLocaleString('id-ID')}</td></tr>`);
            });
            
            w.document.write(`</tbody><tfoot><tr><th colspan="4" class="text-right">TOTAL PENDAPATAN SHIFT:</th><th class="text-right">Rp ${total.toLocaleString('id-ID')}</th></tr></tfoot></table>`);
            w.document.write('</body></html>');
            w.document.close(); w.focus(); w.print(); w.close();
        }
    </script>
</body>
</html>
